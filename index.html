<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>가계도 · Family Tree</title>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가계도">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fdf8f0;
  --surface2: #fff;
  --border: #d4c8b0;
  --border2: #e8dfc8;
  --text: #2c2010;
  --text2: #6b5a3e;
  --text3: #a0906e;
  --accent: #8b5e3c;
  --accent2: #c4914f;
  --male: #4a7fa5;
  --female: #b06080;
  --shadow: rgba(44,32,16,0.12);
  --line: #c4a870;
  --spouse-line: #d4916a;
  --card-w: 140px;
  --card-h: 200px;
  /* ✅ 툴바 두 줄 + 탭 높이 */
  --toolbar-h: 90px;
  --tabs-h: 44px;
}
*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior-y: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── TOOLBAR: 두 줄 구성 ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; flex-direction: column;
  padding-top: env(safe-area-inset-top);
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow);
}
.tb-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  min-height: 44px;
}
.tb-row-1 { border-bottom: 1px solid var(--border2); }

.toolbar-title {
  font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700;
  color: var(--accent); letter-spacing: 1px; white-space: nowrap; margin-right: 2px;
  flex-shrink: 0;
}
.tb-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 10px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text);
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; white-space: nowrap; transition: all .18s; font-weight: 500;
  flex-shrink: 0;
}
.tb-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.tb-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.tb-sep { width: 1px; height: 24px; background: var(--border); margin: 0 1px; flex-shrink: 0; }
.zoom-display { font-size: 12px; color: var(--text2); min-width: 38px; text-align: center; flex-shrink: 0; }
.spacer { flex: 1; }
.tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

#sync-status {
  font-size: 11px; padding: 4px 8px; border-radius: 20px;
  border: 1.5px solid var(--border); white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all .3s; flex-shrink: 0;
}
#sync-status.idle { background: var(--bg); color: var(--text3); }
#sync-status.saving { background: #fff8e0; color: #a07010; border-color: #e0c060; }
#sync-status.saved { background: #e8f5e8; color: #2a8a2a; border-color: #90c890; }
#sync-status.error { background: #fdecea; color: #c0392b; border-color: #e08080; }
#sync-status.loading { background: #e8f0ff; color: #2255bb; border-color: #8899dd; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* ── TABS ── */
#tree-tabs {
  position: fixed;
  top: calc(var(--toolbar-h) + env(safe-area-inset-top));
  left: 0; right: 0; z-index: 95;
  display: flex; background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 2px 8px var(--shadow);
}
.tree-tab {
  flex: 1; text-align: center; padding: 12px 0; font-size: 13.5px;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
  color: var(--text3); cursor: pointer;
  transition: all .2s; border-bottom: 3px solid transparent;
}
.tree-tab.active { color: var(--accent); font-weight: 700; border-bottom-color: var(--accent); }

/* ── SETUP BANNER ── */
#setup-banner {
  position: fixed;
  top: calc(var(--toolbar-h) + var(--tabs-h) + env(safe-area-inset-top));
  left: 0; right: 0; z-index: 90;
  background: linear-gradient(135deg, #fff8e0, #fef8f0);
  border-bottom: 2px solid #e0c060;
  padding: 10px 18px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#setup-banner.hidden { display: none; }
.setup-text { font-size: 12.5px; color: #6b4a10; flex: 1; min-width: 200px; }
.setup-text b { color: #8b5010; }
.setup-input {
  padding: 6px 10px; border-radius: 8px; border: 1.5px solid #c8a840;
  background: #fff; font-size: 16px; font-family: 'Noto Sans KR', sans-serif;
  width: 360px; max-width: 100%; outline: none; color: #333;
}
.setup-input:focus { border-color: var(--accent); }

/* ── CANVAS ── */
#canvas-wrap {
  position: fixed;
  top: calc(var(--toolbar-h) + var(--tabs-h) + env(safe-area-inset-top));
  left: 0; right: 0; bottom: 0;
  overflow: hidden; cursor: grab;
  touch-action: none;
  background:
    radial-gradient(circle at 20% 80%, rgba(196,168,112,.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(176,96,128,.05) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(196,168,112,.12) 39px, rgba(196,168,112,.12) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(196,168,112,.12) 39px, rgba(196,168,112,.12) 40px),
    var(--bg);
  transition: top .2s;
}
#canvas-wrap.with-banner {
  top: calc(var(--toolbar-h) + var(--tabs-h) + 54px + env(safe-area-inset-top));
}
#canvas-wrap.grabbing { cursor: grabbing; }
#canvas { position: absolute; transform-origin: 0 0; }
#lines-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
.line-parent { stroke: var(--line); stroke-width: 2.5; fill: none; stroke-linecap: round; }
.line-spouse { stroke: var(--spouse-line); stroke-width: 2.5; fill: none; stroke-dasharray: 6 4; stroke-linecap: round; }

/* ── NODE ── */
.node { position: absolute; width: var(--card-w); cursor: pointer; transition: filter .2s; }
.node:hover { filter: drop-shadow(0 4px 16px rgba(139,94,60,.35)); }
.node-inner { width: 100%; background: var(--surface2); border-radius: 14px; border: 2px solid var(--border); overflow: hidden; box-shadow: 0 2px 10px var(--shadow); transition: border-color .2s, box-shadow .2s; }
.node.male .node-inner { border-color: #a8c8e0; }
.node.female .node-inner { border-color: #e0a8c0; }
.node.selected .node-inner { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,94,60,.2), 0 4px 16px var(--shadow); }

.node-photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--bg); pointer-events: none; }
.node-photo-placeholder { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 36px; pointer-events: none; }
.node.male .node-photo-placeholder { background: linear-gradient(135deg, #ddeef8, #b8d4e8); }
.node.female .node-photo-placeholder { background: linear-gradient(135deg, #f8dde8, #e8b8c8); }
.node-photo-placeholder:not(.node.male):not(.node.female) { background: linear-gradient(135deg, var(--bg), var(--border2)); }

.node-info { padding: 8px 8px 10px; pointer-events: none; }
.node-name { font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600; text-align: center; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-birth { font-size: 10px; color: var(--text3); text-align: center; margin-top: 2px; }
.node-gender-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
.node.male .node-gender-dot { background: var(--male); }
.node.female .node-gender-dot { background: var(--female); }

.node-actions { position: absolute; bottom: -38px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 4px; gap: 2px; display: none; align-items: center; box-shadow: 0 4px 12px var(--shadow); white-space: nowrap; z-index: 10; }
.node.selected .node-actions { display: flex; }
.node-act-btn { padding: 5px 8px; border: none; background: transparent; font-size: 12px; color: var(--text2); cursor: pointer; border-radius: 6px; transition: background .15s, color .15s; font-family: 'Noto Sans KR', sans-serif; }
.node-act-btn:hover { background: var(--accent); color: #fff; }
.node-act-btn.del:hover { background: #c0392b; color: #fff; }

/* ── MODAL ── */
.modal-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(44,32,16,.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--surface2); border-radius: 18px; border: 2px solid var(--border); box-shadow: 0 8px 40px rgba(44,32,16,.25); width: 100%; max-width: 420px; max-height: 90dvh; overflow-y: auto; }
.modal-header { padding: 18px 20px 12px; border-bottom: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; color: var(--accent); }
.modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg); color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.form-input, .form-select, .form-textarea {
  padding: 10px 12px; border-radius: 9px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: 'Noto Sans KR', sans-serif; outline: none;
  font-size: 16px !important;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.modal-footer { padding: 10px 20px 16px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1.5px solid var(--border2); }
.btn { padding: 10px 18px; border-radius: 9px; border: 1.5px solid var(--border); font-size: 14px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; font-weight: 600; }
.btn-cancel { background: var(--surface); color: var(--text2); }
.btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── LEGEND ── */
#legend { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 16px; z-index: 100; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; box-shadow: 0 4px 16px var(--shadow); font-size: 11px; color: var(--text2); }
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.legend-item:last-child { margin-bottom: 0; }
.legend-line { width: 24px; height: 2px; border-radius: 1px; }
.legend-line.parent { background: var(--line); }
.legend-line.spouse { background: transparent; border-top: 2px dashed var(--spouse-line); }

/* ── HELP ── */
#help-panel { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); right: 16px; z-index: 100; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; box-shadow: 0 4px 20px var(--shadow); font-size: 11.5px; color: var(--text2); max-width: 230px; line-height: 1.7; }
#help-panel.hidden { opacity: 0; pointer-events: none; }
#help-panel h4 { font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--accent); margin-bottom: 8px; }
.help-row { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 2px; }

/* ── CTX MENU ── */
#ctx-menu { position: fixed; z-index: 300; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 11px; padding: 6px; box-shadow: 0 6px 24px var(--shadow); min-width: 170px; display: none; }
#ctx-menu .ctx-item { padding: 9px 12px; border-radius: 7px; font-size: 13.5px; cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 8px; }
#ctx-menu .ctx-item.danger { color: #c0392b; }
#ctx-menu .ctx-sep { height: 1px; background: var(--border2); margin: 4px 0; }

/* ── TOAST ── */
#toast { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(80px); z-index: 300; background: var(--text); color: #fff; padding: 9px 18px; border-radius: 10px; font-size: 12.5px; opacity: 0; transition: transform .3s, opacity .3s; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── LOADING ── */
#loading-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(245,240,232,.85); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
#loading-overlay.hidden { display: none; }
.loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Noto Serif KR', serif; font-size: 15px; color: var(--accent); }

@media (max-width: 600px) {
  .toolbar-title { font-size: 14px; }
  .tb-btn span { display: none; }
  .tb-btn { padding: 6px 8px; }
  #help-panel { display: none; }
  :root { --card-w: 120px; --card-h: 185px; }
  .setup-input { width: 100%; }
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader"></div>
  <div class="loading-text">가계도 불러오는 중...</div>
</div>

<!-- ✅ 두 줄 툴바 -->
<div id="toolbar">
  <!-- 1줄: 타이틀 + 인물추가 + 줌 컨트롤 + 맞춤 -->
  <div class="tb-row tb-row-1">
    <div class="toolbar-title">🌳 가계도</div>
    <button class="tb-btn primary" onclick="openAddModal(null,'root')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>인물 추가</span>
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="zoom(0.15)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <div class="zoom-display" id="zoom-display">100%</div>
    <button class="tb-btn" onclick="zoom(-0.15)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="tb-btn" onclick="fitView()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span>맞춤</span>
    </button>
  </div>
  <!-- 2줄: 동기화 상태 + 저장 + 도움말 -->
  <div class="tb-row">
    <div id="sync-status" class="idle"><div class="sync-dot"></div><span id="sync-text">연결 안됨</span></div>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="manualSave()" title="지금 저장">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span>저장</span>
    </button>
    <button class="tb-btn" onclick="toggleHelp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>도움말</span>
    </button>
  </div>
</div>

<div id="tree-tabs">
  <div class="tree-tab active" onclick="switchTree('친가')">친가</div>
  <div class="tree-tab" onclick="switchTree('친외가')">친외가</div>
  <div class="tree-tab" onclick="switchTree('처가')">처가</div>
  <div class="tree-tab" onclick="switchTree('처외가')">처외가</div>
</div>

<div id="setup-banner">
  <div class="setup-text">☁️ <b>GAS URL 설정</b> — 클라우드 저장을 위한 링크</div>
  <input class="setup-input" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec">
  <button class="tb-btn primary" onclick="applyGasUrl()">연결</button>
  <button class="tb-btn" onclick="dismissBanner()">나중에</button>
</div>

<div id="canvas-wrap" class="with-banner">
  <svg id="lines-svg" width="0" height="0"></svg>
  <div id="canvas"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-line parent"></div>부모-자녀</div>
  <div class="legend-item"><div class="legend-line spouse"></div>배우자</div>
</div>

<div id="help-panel">
  <h4>📖 사용 방법</h4>
  <div class="help-row">➕ <span>인물 추가 버튼으로 등록</span></div>
  <div class="help-row">👆 <span>카드 클릭 → 하단 메뉴</span></div>
  <div class="help-row">✏️ <span>길게 누르기(우클릭) → 상세 메뉴</span></div>
  <div class="help-row">🖱️ <span>빈 곳 드래그로 이동</span></div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-edit">✏️ 정보 수정</div>
  <div class="ctx-item" id="ctx-add-child">👶 자녀 추가</div>
  <div class="ctx-item" id="ctx-add-spouse">💍 배우자 연결</div>
  <div class="ctx-item" id="ctx-add-parent">⬆️ 부모 추가</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-delete">🗑️ 삭제</div>
</div>

<div id="toast"></div>

<div id="modal-backdrop" class="modal-backdrop" style="display:none" onclick="handleBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">인물 추가</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      
      <div class="form-group" style="text-align: center; margin-bottom: 5px;">
        <div id="photo-box" style="width: 100px; height: 100px; border-radius: 12px; border: 2px dashed #d4c8b0; overflow: hidden; position: relative; margin: 0 auto; background: #fff; touch-action: none;">
          <input type="file" id="modal-photo-upload" accept="image/*" style="display:none;">
          <img id="modal-photo-preview" style="position: absolute; cursor: grab; transform-origin: top left; display: none; left: 0; top: 0; pointer-events: none;">
          <div id="modal-photo-placeholder" onclick="document.getElementById('modal-photo-upload').click()" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:#a0906e; font-weight: 600;">사진 등록</div>
        </div>
        <p style="font-size: 11px; color: #8b5e3c; margin-top: 8px; margin-bottom:0;">사진을 드래그해 얼굴 위치를 맞추세요</p>
        <button type="button" onclick="document.getElementById('modal-photo-upload').click()" style="margin-top: 6px; font-size: 12px; padding: 6px 12px; cursor: pointer; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; color: var(--text);">새 사진 올리기</button>
      </div>

      <div class="form-group">
        <label class="form-label">이름 *</label>
        <input class="form-input" id="f-name" placeholder="이름을 입력하세요">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">출생 연도</label>
          <input class="form-input" id="f-birth" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">성별</label>
          <select class="form-select" id="f-gender">
            <option value="">선택</option>
            <option value="male">남성 👨</option>
            <option value="female">여성 👩</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">메모 (앞에 [1], [2]를 적으면 강제정렬)</label>
        <textarea class="form-textarea" id="f-memo" placeholder="직업, 특이사항 등"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════
const LS_DATA = 'familytree_data';
const LS_URL  = 'familytree_gas_url';

let GAS_URL = 'https://script.google.com/macros/s/AKfycbyNwQiL3UW_-5NFSLzAmgEORNbKD_eHdu9BlGWTHzYynSfvletb3LNFI9FMm-QPY85d/exec';

let members={}, relations=[], nextId=1, positions={};
let tx=60, ty=80, scale=1;
let dragging=false, lastMx=0, lastMy=0;
let selectedId=null, modalMode=null;
let saveTimer=null;
const CW=140, CH=200, HG=50, VG=90;

let currentTree = '친가';
let visibleMembers = {};
let visibleRelations = [];

// ── 구글 드라이브 URL 자동 변환 ──
function getValidImageUrl(url) {
  if (!url) return '';
  if (url.startsWith('data:')) return url;
  if (url.includes('drive.google.com')) {
    let id = null;
    const match1 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const match2 = url.match(/id=([a-zA-Z0-9_-]+)/);
    if (match1) id = match1[1];
    else if (match2) id = match2[1];
    if (id) return `https://drive.google.com/uc?export=view&id=${id}`;
  }
  return url;
}

// ═══════════════════════════════════════
// SETUP BANNER & SYNC
// ═══════════════════════════════════════
function applyGasUrl(){
  const url=document.getElementById('gas-url-input').value.trim();
  if(!url.startsWith('https://script.google.com')){toast('올바른 GAS URL을 입력해주세요.');return;}
  GAS_URL=url; localStorage.setItem(LS_URL,url);
  dismissBanner(); setSyncStatus('loading','불러오는 중...');
  loadFromGAS();
}
function dismissBanner(){
  document.getElementById('setup-banner').classList.add('hidden');
  document.getElementById('canvas-wrap').classList.remove('with-banner');
}
function setSyncStatus(state,text){
  const el=document.getElementById('sync-status');
  el.className=state; document.getElementById('sync-text').textContent=text;
}

async function loadFromGAS(){
  if(!GAS_URL){hideLoading();loadFromLocal();return;}
  showLoading();
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now());
    const json=await res.json();
    if(json.ok&&json.data){
      applyData(json.data); saveToLocal();
      setSyncStatus('saved','클라우드 연결됨');
      toast('☁️ 가계도를 불러왔습니다.');
    }else{loadFromLocal();setSyncStatus('error','불러오기 실패');}
  }catch(e){
    loadFromLocal(); setSyncStatus('error','오프라인');
  }
  hideLoading();
}

async function saveToGAS(){
  if(!GAS_URL){saveToLocal();setSyncStatus('idle','로컬 저장됨');return;}
  setSyncStatus('saving','저장 중...');
  const payload=getPayload();
  try{
    const res=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)
    });
    const json=await res.json();
    if(json.ok){
      // ✅ GAS가 Base64→Drive URL로 교체한 데이터를 받아서 적용
      // applyData는 render()를 호출하므로 사진이 URL로 즉시 반영됨
      if(json.data){
        // members의 photo 필드를 GAS 반환값으로 교체 (URL 보장)
        const gasMembers = json.data.members || {};
        Object.keys(gasMembers).forEach(id => {
          if(members[id]){
            const url = gasMembers[id].photo_url || gasMembers[id].photo || null;
            if(url && !url.startsWith('data:')){
              members[id].photo     = url;
              members[id].photo_url = url;
            }
          }
        });
      }
      saveToLocal(); // ← URL로 교체된 뒤 로컬 저장
      setSyncStatus('saved','저장 완료 ✓');
      setTimeout(()=>setSyncStatus('saved','클라우드 연결됨'),2000);
    }else{ setSyncStatus('error','저장 실패'); }
  }catch(e){
    saveToLocal(); setSyncStatus('error','오프라인 저장');
  }
}

function getPayload(){return{members,relations,nextId};}

function applyData(d){
  const raw = d.members || {};
  // GAS는 photo_url 컬럼으로 반환 → photo에도 통일
  Object.values(raw).forEach(m => {
    const url = m.photo_url || m.photo || null;
    m.photo     = url;
    m.photo_url = url;
  });
  members=raw; relations=d.relations||[]; nextId=d.nextId||(Object.keys(raw).length+1);
  render(); setTimeout(fitView,80);
}

// 로컬 저장 시 Base64 제거 (Drive URL만 유지)
function saveToLocal(){
  const safe = JSON.parse(JSON.stringify({members,relations,nextId}));
  Object.values(safe.members).forEach(m=>{
    if(m.photo     && m.photo.startsWith('data:'))     m.photo     = null;
    if(m.photo_url && m.photo_url.startsWith('data:')) m.photo_url = null;
  });
  localStorage.setItem(LS_DATA, JSON.stringify(safe));
}
function loadFromLocal(){
  const raw=localStorage.getItem(LS_DATA);
  if(raw){
    try{
      const parsed=JSON.parse(raw);
      // 로컬에 혹시 남은 Base64 제거 후 applyData
      if(parsed.members){
        Object.values(parsed.members).forEach(m=>{
          if(m.photo     && m.photo.startsWith('data:'))     m.photo     = null;
          if(m.photo_url && m.photo_url.startsWith('data:')) m.photo_url = null;
        });
      }
      applyData(parsed);
      setSyncStatus('idle','로컬 데이터');
    }catch(e){}
  }
  hideLoading();
}
function scheduleSave(){clearTimeout(saveTimer);setSyncStatus('saving','변경 감지...');saveTimer=setTimeout(()=>saveToGAS(),3000);}
function manualSave(){clearTimeout(saveTimer);saveToGAS();}
function showLoading(){document.getElementById('loading-overlay').classList.remove('hidden');}
function hideLoading(){document.getElementById('loading-overlay').classList.add('hidden');}

// ═══════════════════════════════════════
// TABS & CANVAS
// ═══════════════════════════════════════
function switchTree(treeName){
  currentTree=treeName;
  document.querySelectorAll('.tree-tab').forEach(el=>{
    el.classList.toggle('active',el.textContent===treeName);
  });
  selectedId=null; tx=60; ty=80; scale=1; render();
  setTimeout(fitView,50);
}

const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('canvas');

wrap.addEventListener('mousedown',e=>{if(e.target.closest('.node'))return;dragging=true;lastMx=e.clientX;lastMy=e.clientY;wrap.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!dragging)return;tx+=e.clientX-lastMx;ty+=e.clientY-lastMy;lastMx=e.clientX;lastMy=e.clientY;applyT();});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('grabbing');});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91,r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  tx=mx-(mx-tx)*f;ty=my-(my-ty)*f;scale=Math.min(3,Math.max(0.2,scale*f));applyT();
},{passive:false});

let touches={};
wrap.addEventListener('touchstart',e=>{
  if(e.target.closest('.node-actions'))return;
  [...e.changedTouches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  if(e.target.closest('.node-actions'))return;
  e.preventDefault();
  if(Object.keys(touches).length===1){
    const t=e.changedTouches[0],p=touches[t.identifier];
    if(p){tx+=t.clientX-p.x;ty+=t.clientY-p.y;applyT();}
    touches[t.identifier]={x:t.clientX,y:t.clientY};
  }else if(Object.keys(touches).length>=2){
    const [a,b]=[...e.changedTouches];
    const pA=touches[a.identifier],pB=touches[b.identifier];
    if(pA&&pB){
      const d1=Math.hypot(pA.x-pB.x,pA.y-pB.y),d2=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
      const f=d2/d1,r=wrap.getBoundingClientRect();
      const cx=(a.clientX+b.clientX)/2-r.left,cy=(a.clientY+b.clientY)/2-r.top;
      tx=cx-(cx-tx)*f;ty=cy-(cy-ty)*f;scale=Math.min(3,Math.max(0.2,scale*f));applyT();
    }
    touches[a.identifier]={x:a.clientX,y:a.clientY};
    if(b)touches[b.identifier]={x:b.clientX,y:b.clientY};
  }
},{passive:false});
wrap.addEventListener('touchend',e=>{[...e.changedTouches].forEach(t=>delete touches[t.identifier]);});
wrap.addEventListener('touchcancel',e=>{[...e.changedTouches].forEach(t=>delete touches[t.identifier]);});

function applyT(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;document.getElementById('zoom-display').textContent=Math.round(scale*100)+'%';renderLines();}
function zoom(d){scale=Math.min(3,Math.max(0.2,scale+d));applyT();}
function fitView(){
  const ids=Object.keys(positions);
  if(!ids.length){tx=60;ty=80;scale=1;applyT();return;}
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  ids.forEach(id=>{const p=positions[id];x0=Math.min(x0,p.x);y0=Math.min(y0,p.y);x1=Math.max(x1,p.x+CW);y1=Math.max(y1,p.y+CH);});
  const r=wrap.getBoundingClientRect();
  scale=Math.min(3,Math.max(0.2,Math.min((r.width-80)/Math.max(x1-x0,1),(r.height-80)/Math.max(y1-y0,1))));
  tx=(r.width-(x1-x0)*scale)/2-x0*scale;ty=(r.height-(y1-y0)*scale)/2-y0*scale;applyT();
}

// ═══════════════════════════════════════
// RENDER & LAYOUT
// ═══════════════════════════════════════
function render(){
  const catMap={};
  relations.filter(r=>r.type==='category').forEach(r=>catMap[r.to]=r.from);
  visibleMembers={};
  Object.values(members).forEach(m=>{
    if((catMap[m.id]||'친가')===currentTree) visibleMembers[m.id]=m;
  });
  visibleRelations=relations.filter(r=>r.type!=='category'&&visibleMembers[r.from]&&visibleMembers[r.to]);
  computeLayout();renderNodes();renderLines();
}

function computeLayout(){
  positions={};
  if(!Object.keys(visibleMembers).length)return;
  const allIds=new Set(Object.keys(visibleMembers));
  const hasParent=new Set(visibleRelations.filter(r=>r.type==='parent').map(r=>r.to));
  const sm={};
  visibleRelations.filter(r=>r.type==='spouse').forEach(r=>{(sm[r.from]=sm[r.from]||[]).push(r.to);(sm[r.to]=sm[r.to]||[]).push(r.from);});
  let changed=true;
  while(changed){
    changed=false;
    visibleRelations.filter(r=>r.type==='spouse').forEach(r=>{
      if(hasParent.has(r.from)&&!hasParent.has(r.to)){hasParent.add(r.to);changed=true;}
      if(hasParent.has(r.to)&&!hasParent.has(r.from)){hasParent.add(r.from);changed=true;}
    });
  }
  const ch=id=>visibleRelations.filter(r=>r.type==='parent'&&r.from===id).map(r=>r.to);
  const cch=id=>[...new Set([...ch(id),...(sm[id]||[]).flatMap(s=>ch(s))])];
  const vis=new Set();
  const sortByAge=(a,b)=>{
    const getOrder=memo=>{if(!memo)return 9999;const m=memo.match(/^\[(\d+)\]/);return m?parseInt(m[1],10):9999;};
    const oA=getOrder(visibleMembers[a].memo),oB=getOrder(visibleMembers[b].memo);
    if(oA!==oB)return oA-oB;
    return(visibleMembers[a].birth||'9999').localeCompare(visibleMembers[b].birth||'9999');
  };
  function place(id,x,y){
    if(vis.has(id))return{width:CW,centerX:x+CW/2};
    vis.add(id);
    const sp=(sm[id]||[]).filter(s=>!vis.has(s));
    sp.forEach(s=>vis.add(s));
    let kids=cch(id);kids.sort(sortByAge);
    const grp=[id,...sp];let sw=0;
    if(kids.length){
      let cx=x;
      kids.forEach(kid=>{
        if(vis.has(kid)){cx+=CW+HG;return;}
        const r=place(kid,cx,y+CH+VG);cx+=r.width+HG;sw+=r.width+HG;
      });
      if(sw>0)sw-=HG;
    }
    const gw=grp.length*(CW+HG/2)-HG/2,tw=Math.max(gw,sw||0),cx2=x+tw/2;
    const sx=cx2-gw/2;
    grp.forEach((gid,i)=>{positions[gid]={x:sx+i*(CW+HG/2),y};});
    return{width:tw,centerX:cx2};
  }
  let cx=0;
  let roots=[...allIds].filter(id=>!hasParent.has(id));
  roots.sort(sortByAge);
  const done=new Set();
  roots.forEach(id=>{
    if(done.has(id))return;done.add(id);
    (sm[id]||[]).forEach(s=>done.add(s));
    const r=place(id,cx,0);cx+=r.width+HG*2;
  });
  allIds.forEach(id=>{if(!vis.has(id)){positions[id]={x:cx,y:0};cx+=CW+HG;}});
}

function renderNodes(){
  canvas.querySelectorAll('.node').forEach(n=>n.remove());
  Object.values(visibleMembers).forEach(m=>{
    const p=positions[m.id];if(!p)return;
    const d=document.createElement('div');
    d.className='node'+(m.gender?' '+m.gender:'')+(selectedId===m.id?' selected':'');
    d.id='node-'+m.id;d.style.left=p.x+'px';d.style.top=p.y+'px';d.style.width=CW+'px';
    const ge=m.gender==='male'?'👨':m.gender==='female'?'👩':'👤';
    let ageStr='';
    if(m.birth){const bd=new Date(m.birth);const age=new Date().getFullYear()-bd.getFullYear()+1;if(!isNaN(age))ageStr=age+'세';}
    let displayMemo=(m.memo||'').replace(/^\[\d+\]\s*/,'');
    const rawPhoto=m.photo_url||m.photo||'';
    const validPhotoSrc=getValidImageUrl(rawPhoto);
    d.innerHTML=`<div class="node-inner">
      ${validPhotoSrc
        ? `<img class="node-photo" src="${validPhotoSrc}" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          +`<div class="node-photo-placeholder" style="display:none">${ge}</div>`
        : `<div class="node-photo-placeholder">${ge}</div>`}
      <div class="node-info">
        <div class="node-name"><span class="node-gender-dot"></span>${m.name}</div>
        ${ageStr?`<div class="node-birth">${ageStr}</div>`:''}
        ${displayMemo?`<div class="node-birth" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9.5px">${displayMemo}</div>`:''}
      </div>
    </div>
    <div class="node-actions">
      <button class="node-act-btn" onclick="openAddModal('${m.id}','child')">자녀+</button>
      <button class="node-act-btn" onclick="openAddModal('${m.id}','spouse')">배우자+</button>
      <button class="node-act-btn" onclick="openEditModal('${m.id}')">수정</button>
      <button class="node-act-btn del" onclick="deleteMember('${m.id}')">삭제</button>
    </div>`;
    d.addEventListener('click',e=>{e.stopPropagation();selectNode(m.id);});
    d.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,m.id);});
    canvas.appendChild(d);
  });
}

function renderLines(){
  const svg=document.getElementById('lines-svg');svg.innerHTML='';
  const r=wrap.getBoundingClientRect();
  svg.setAttribute('width',r.width);svg.setAttribute('height',r.height);
  const ws=(x,y)=>({x:x*scale+tx,y:y*scale+ty});
  const sm={};
  visibleRelations.filter(r=>r.type==='spouse').forEach(r=>{(sm[r.from]=sm[r.from]||[]).push(r.to);(sm[r.to]=sm[r.to]||[]).push(r.from);});
  const drawn=new Set();
  visibleRelations.filter(r=>r.type==='spouse').forEach(r=>{
    const key=[r.from,r.to].sort().join('-');
    if(drawn.has(key)||!positions[r.from]||!positions[r.to])return;drawn.add(key);
    const pf=positions[r.from],pt=positions[r.to];
    const L=pf.x<pt.x?r.from:r.to,R=pf.x<pt.x?r.to:r.from;
    const a=ws(positions[L].x+CW,positions[L].y+CH/2),b=ws(positions[R].x,positions[R].y+CH/2);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${a.x},${a.y} L${b.x},${b.y}`);path.setAttribute('class','line-spouse');svg.appendChild(path);
  });
  visibleRelations.filter(r=>r.type==='parent').forEach(r=>{
    if(!positions[r.from]||!positions[r.to])return;
    const pb=ws(positions[r.from].x+CW/2,positions[r.from].y+CH);
    const ct=ws(positions[r.to].x+CW/2,positions[r.to].y);
    const my=(pb.y+ct.y)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${pb.x},${pb.y} C${pb.x},${my} ${ct.x},${my} ${ct.x},${ct.y}`);
    path.setAttribute('class','line-parent');svg.appendChild(path);
  });
}

// ═══════════════════════════════════════
// SELECTION & CONTEXT MENU
// ═══════════════════════════════════════
function selectNode(id){selectedId=selectedId===id?null:id;renderNodes();}
document.addEventListener('click',()=>{if(selectedId){selectedId=null;renderNodes();}hideCtx();});
function showCtx(e,id){
  selectedId=id;renderNodes();
  const m=document.getElementById('ctx-menu');m.style.display='block';
  let x=e.clientX,y=e.clientY;
  if(x+180>window.innerWidth)x=window.innerWidth-185;
  if(y+200>window.innerHeight)y=window.innerHeight-205;
  m.style.left=x+'px';m.style.top=y+'px';
  document.getElementById('ctx-edit').onclick=()=>{hideCtx();openEditModal(id);};
  document.getElementById('ctx-add-child').onclick=()=>{hideCtx();openAddModal(id,'child');};
  document.getElementById('ctx-add-spouse').onclick=()=>{hideCtx();openAddModal(id,'spouse');};
  document.getElementById('ctx-add-parent').onclick=()=>{hideCtx();openAddModal(id,'parent');};
  document.getElementById('ctx-delete').onclick=()=>{hideCtx();deleteMember(id);};
}
function hideCtx(){document.getElementById('ctx-menu').style.display='none';}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openAddModal(relId,action){
  modalMode={action,relId,editId:null};
  document.getElementById('modal-title').textContent=action==='child'?'자녀 추가':action==='spouse'?'배우자 추가':action==='parent'?'부모 추가':'인물 추가';
  clearForm();resetPhotoEditor(null);
  document.getElementById('modal-backdrop').style.display='flex';
}
function openEditModal(id){
  const m=members[id];if(!m)return;
  modalMode={action:'edit',relId:null,editId:id};
  document.getElementById('modal-title').textContent='정보 수정';
  document.getElementById('f-name').value=m.name||'';
  document.getElementById('f-birth').value=m.birth||'';
  document.getElementById('f-gender').value=m.gender||'';
  document.getElementById('f-memo').value=m.memo||'';
  const rawPhoto=m.photo_url||m.photo||'';
  resetPhotoEditor(getValidImageUrl(rawPhoto));
  document.getElementById('modal-backdrop').style.display='flex';
}
function clearForm(){
  ['f-name','f-birth','f-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-gender').value='';
}
function closeModal(){document.getElementById('modal-backdrop').style.display='none';}
function handleBackdropClick(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}

function saveModal(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('이름을 입력해주세요.');return;}
  const birth=document.getElementById('f-birth').value,gender=document.getElementById('f-gender').value,memo=document.getElementById('f-memo').value.trim();

  // 새로 선택한 사진(Base64)만 가져옴. null이면 사진 변경 없음
  const newPhotoBase64 = getCroppedBase64();

  if(modalMode.action==='edit'){
    const m=members[modalMode.editId];
    m.name=name; m.birth=birth; m.gender=gender; m.memo=memo;
    // 새 사진 선택했을 때만 덮어씀 (기존 Drive URL 보호)
    if(newPhotoBase64){ m.photo=newPhotoBase64; m.photo_url=newPhotoBase64; }
    toast(`${name} 정보가 수정되었습니다.`);
  }else{
    const id='p'+nextId++;
    members[id]={id,name,birth,gender,memo,
      photo:    newPhotoBase64||null,
      photo_url:newPhotoBase64||null
    };
    relations.push({type:'category',from:currentTree,to:id});
    if(modalMode.action==='child' &&modalMode.relId)relations.push({type:'parent',from:modalMode.relId,to:id});
    else if(modalMode.action==='spouse'&&modalMode.relId)relations.push({type:'spouse',from:modalMode.relId,to:id});
    else if(modalMode.action==='parent'&&modalMode.relId)relations.push({type:'parent',from:id,to:modalMode.relId});
    toast(`${name} 님이 추가되었습니다.`);
  }
  closeModal();render();scheduleSave();
  if(Object.keys(visibleMembers).length===1)setTimeout(fitView,50);
}
function deleteMember(id){
  const m=members[id];if(!m)return;
  if(!confirm(`"${m.name}" 을(를) 삭제할까요?\n관련 관계도 모두 삭제됩니다.`))return;
  delete members[id];delete positions[id];
  relations=relations.filter(r=>r.from!==id&&r.to!==id);
  if(selectedId===id)selectedId=null;
  render();scheduleSave();toast(`${m.name} 이(가) 삭제되었습니다.`);
}

// ═══════════════════════════════════════
// HELP & TOAST
// ═══════════════════════════════════════
let helpVisible=true;
function toggleHelp(){helpVisible=!helpVisible;document.getElementById('help-panel').classList.toggle('hidden',!helpVisible);}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}
window.addEventListener('resize',renderLines);

// ═══════════════════════════════════════
// ✅ PHOTO ENGINE (크롭 버그 수정)
// ═══════════════════════════════════════
let currentRawImg = null;
let imgX = 0, imgY = 0, isDragging = false, startX, startY;
const MODAL_BOX = 100; // UI 미리보기 박스 크기 (px)

// 파일 업로드 → 리사이즈 → 미리보기
document.addEventListener('change', function(e) {
  if (e.target.id !== 'modal-photo-upload') return;
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const tempImg = new Image();
    tempImg.onload = function() {
      // 리사이즈: 최대 800px
      const MAX = 800;
      let w = tempImg.width, h = tempImg.height;
      if (w > MAX || h > MAX) {
        const ratio = Math.min(MAX / w, MAX / h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      const rc = document.createElement('canvas');
      rc.width = w; rc.height = h;
      rc.getContext('2d').drawImage(tempImg, 0, 0, w, h);

      currentRawImg = new Image();
      currentRawImg.onload = function() {
        const previewImg = document.getElementById('modal-photo-preview');
        // 박스를 꽉 채우는 비율로 렌더
        const r = Math.max(MODAL_BOX / currentRawImg.width, MODAL_BOX / currentRawImg.height);
        previewImg.style.width  = (currentRawImg.width  * r) + 'px';
        previewImg.style.height = (currentRawImg.height * r) + 'px';
        previewImg.src = currentRawImg.src;
        previewImg.style.display = 'block';
        document.getElementById('modal-photo-placeholder').style.display = 'none';
        // 초기 위치: 가운데 정렬
        imgX = (MODAL_BOX - currentRawImg.width  * r) / 2;
        imgY = (MODAL_BOX - currentRawImg.height * r) / 2;
        updateImgPos();
      };
      currentRawImg.src = rc.toDataURL('image/jpeg', 0.85);
    };
    tempImg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// 외부/구글드라이브 URL 로드 (수정 모달용)
function loadExistingPhotoToEditor(src) {
  const previewImg = document.getElementById('modal-photo-preview');
  if (src.startsWith('http')) {
    // 외부 URL → 드래그 크롭 미지원, 그냥 표시만
    previewImg.style.width = '100%';
    previewImg.style.height = '100%';
    previewImg.style.objectFit = 'cover';
    previewImg.setAttribute('referrerpolicy', 'no-referrer');
    previewImg.src = src;
    previewImg.style.display = 'block';
    previewImg.style.transform = 'translate(0px,0px)';
    document.getElementById('modal-photo-placeholder').style.display = 'none';
    currentRawImg = null;
    return;
  }
  // Base64 → 편집 가능
  currentRawImg = new Image();
  currentRawImg.onload = function() {
    const previewImg = document.getElementById('modal-photo-preview');
    const r = Math.max(MODAL_BOX / currentRawImg.width, MODAL_BOX / currentRawImg.height);
    previewImg.style.width  = (currentRawImg.width  * r) + 'px';
    previewImg.style.height = (currentRawImg.height * r) + 'px';
    previewImg.src = currentRawImg.src;
    previewImg.style.display = 'block';
    document.getElementById('modal-photo-placeholder').style.display = 'none';
    imgX = (MODAL_BOX - currentRawImg.width  * r) / 2;
    imgY = (MODAL_BOX - currentRawImg.height * r) / 2;
    updateImgPos();
  };
  currentRawImg.src = src;
}

function updateImgPos() {
  const previewImg = document.getElementById('modal-photo-preview');
  if (previewImg) previewImg.style.transform = `translate(${imgX}px, ${imgY}px)`;
}

// 드래그로 사진 위치 조정
function startDrag(e) {
  const box = e.target.closest('#photo-box');
  if (!box || !currentRawImg) return;
  isDragging = true;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  startX = cx - imgX; startY = cy - imgY;
  document.getElementById('modal-photo-preview').style.cursor = 'grabbing';
}
function doDrag(e) {
  if (!isDragging) return;
  if (e.cancelable) e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  imgX = cx - startX; imgY = cy - startY;
  updateImgPos();
}
function endDrag() {
  isDragging = false;
  const p = document.getElementById('modal-photo-preview');
  if (p) p.style.cursor = 'grab';
}
document.addEventListener('mousedown',  startDrag);
document.addEventListener('touchstart', startDrag, {passive: false});
document.addEventListener('mousemove',  doDrag,    {passive: false});
document.addEventListener('touchmove',  doDrag,    {passive: false});
document.addEventListener('mouseup',    endDrag);
document.addEventListener('touchend',   endDrag);
document.addEventListener('touchcancel',endDrag);

// ✅ 핵심 수정: canvas에 실제로 보이는 위치 그대로 잘라내기
function getCroppedBase64() {
  const previewImg = document.getElementById('modal-photo-preview');
  if (!currentRawImg || previewImg.style.display === 'none') return null;

  try {
    const CROP = 160; // 저장할 이미지 크기

    // 미리보기에서 img 실제 렌더 크기
    const renderedW = parseFloat(previewImg.style.width);
    const renderedH = parseFloat(previewImg.style.height);

    // 미리보기 박스(MODAL_BOX) 대비 저장 캔버스(CROP) 배율
    const scale = CROP / MODAL_BOX;

    const cvs = document.createElement('canvas');
    cvs.width = CROP; cvs.height = CROP;
    const ctx = cvs.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, CROP, CROP);

    // 원본 이미지 → 렌더된 크기의 배율
    const srcScaleX = currentRawImg.width  / renderedW;
    const srcScaleY = currentRawImg.height / renderedH;

    // 잘라낼 원본 좌표 (imgX, imgY는 MODAL_BOX 기준 오프셋)
    const sx = -imgX * srcScaleX;
    const sy = -imgY * srcScaleY;
    // 잘라낼 원본 크기 (MODAL_BOX를 원본 해상도로 환산)
    const sw = MODAL_BOX * srcScaleX;
    const sh = MODAL_BOX * srcScaleY;

    ctx.drawImage(currentRawImg, sx, sy, sw, sh, 0, 0, CROP, CROP);
    return cvs.toDataURL('image/jpeg', 0.85);
  } catch(e) {
    console.warn('사진 크롭 오류:', e);
    return null;
  }
}

function resetPhotoEditor(existingPhotoSrc) {
  currentRawImg = null; imgX = 0; imgY = 0;
  const previewImg = document.getElementById('modal-photo-preview');
  const placeholder = document.getElementById('modal-photo-placeholder');
  const uploadInput = document.getElementById('modal-photo-upload');
  if (uploadInput) uploadInput.value = '';
  if (previewImg) {
    previewImg.style.display = 'none';
    previewImg.style.transform = 'translate(0px,0px)';
    previewImg.style.width = '';
    previewImg.style.height = '';
    previewImg.style.objectFit = '';
    previewImg.removeAttribute('referrerpolicy');
    previewImg.src = '';
  }
  if (placeholder) placeholder.style.display = 'flex';
  if (existingPhotoSrc) loadExistingPhotoToEditor(existingPhotoSrc);
}
